<!DOCTYPE html>
<!--
  OmniSense Lab — App Shell（導覽、BLE、PWA）
  目前釋出：0.2.2 · 版本規則：docs/VERSIONING.md
-->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OmniSense Lab</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <meta name="theme-color" content="#0f172a">
    <meta name="application-name" content="OmniSense Lab">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OmniSense">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .canvas-container canvas { border-radius: 1rem; width: 100% !important; height: auto !important; }
        .pin-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .pin-btn:active { transform: scale(0.95); }
        input[type=range] { accent-color: #22d3ee; }
        #toolbarActions button { position: relative; z-index: 40; pointer-events: auto; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        #pwaInstallBanner { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pullup-btn.pullup-active { color: #22d3ee; border-color: rgba(34, 211, 238, 0.55); box-shadow: 0 0 10px rgba(34, 211, 238, 0.45); }
        .nav-tab { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.5rem 0.9rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 700; border: 1px solid transparent; transition: background 0.15s, color 0.15s, border-color 0.15s; }
        .nav-tab:not(.nav-tab-active) { color: #94a3b8; }
        .nav-tab:not(.nav-tab-active):hover { background: rgba(30, 41, 59, 0.8); color: #e2e8f0; }
        .nav-tab-active { background: rgba(6, 182, 212, 0.15); color: #22d3ee; border-color: rgba(34, 211, 238, 0.35); }
        #navMobile .nav-tab { flex: 1; flex-direction: column; justify-content: center; font-size: 0.65rem; padding: 0.5rem 0.25rem; gap: 0.2rem; }
        #navMobile .nav-tab i { width: 1.35rem; height: 1.35rem; }
        @media (max-width: 768px) {
            .app-shell-inner { padding-left: 0.75rem; padding-right: 0.75rem; padding-top: 0.5rem; }
            #appHeader { margin-bottom: 0.75rem; gap: 0.75rem !important; }
            .app-header-brand { gap: 0.75rem !important; }
            .app-header-brand .app-logo-wrap { padding: 0.375rem; border-radius: 0.625rem; }
            .app-header-brand .app-logo-wrap i { width: 1.375rem !important; height: 1.375rem !important; }
            .app-header-brand h1 { font-size: 1.15rem; line-height: 1.25; }
            .app-header-brand #headerSubtitle { font-size: 0.65rem; }
            .app-header-brand #syncIndicator { font-size: 9px; margin-top: 0.25rem; }
            .app-header-actions {
                width: 100%;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px !important;
                justify-content: flex-start;
            }
            #connectBtn, #disconnectBtn {
                flex: 0 0 auto;
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
                font-size: 0.75rem;
                border-radius: 9999px;
            }
            #connectBtn i, #disconnectBtn i { width: 0.95rem; height: 0.95rem; }
            .app-header-pills { gap: 8px !important; flex-wrap: wrap; justify-content: flex-end; }
            #connQualityPill, #actualFpsPill {
                font-size: 9px !important;
                padding: 0.25rem 0.45rem !important;
                line-height: 1.25;
                min-width: 0;
            }
            #experiment-root { gap: 0.75rem; }
            #navMobile .nav-tab { font-size: 0.58rem; padding: 0.35rem 0.15rem; gap: 0.15rem; }
            #navMobile .nav-tab i { width: 1.15rem; height: 1.15rem; }
            #navMobileInner { padding-top: 0.25rem; padding-bottom: 0.25rem; }
        }
    </style>
</head>
<body class="min-h-screen bg-[#0f172a] text-slate-100 pb-[4.35rem] md:pb-8 max-[768px]:pb-[calc(3.65rem+env(safe-area-inset-bottom,0px))]">
    <div class="app-shell-inner max-w-7xl mx-auto px-3 md:px-8 pt-2 md:pt-8">
        <header id="appHeader" class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-8 gap-3 md:gap-4">
            <div class="app-header-brand flex items-center gap-3 md:gap-4 min-w-0">
                <a href="https://github.com/blackdogii/OmniSense-Lab" target="_blank" rel="noopener noreferrer" class="app-logo-wrap bg-cyan-500 p-2 rounded-xl shadow-lg shadow-cyan-500/20 shrink-0 block hover:opacity-90 transition-opacity focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/70" aria-label="OmniSense Lab GitHub 專案">
                    <i data-lucide="microscope" class="text-white w-8 h-8"></i>
                </a>
                <div class="min-w-0">
                    <p class="text-[11px] text-slate-500 font-medium tracking-wide">2026物理動手做</p>
                    <h1 class="text-xl md:text-3xl font-black text-cyan-400 tracking-tight truncate">OmniSense Lab</h1>
                    <p id="headerSubtitle" class="text-slate-400 text-xs font-medium tracking-wide">系統主控台</p>
                    <p id="syncIndicator" class="text-[10px] text-slate-500 italic mt-1"><i data-lucide="refresh-cw" class="w-3 h-3 inline"></i> 尚未連線</p>
                </div>
            </div>
            <div class="app-header-actions flex gap-2 md:gap-3 shrink-0 items-center flex-wrap md:flex-nowrap w-full md:w-auto">
                <button type="button" id="connectBtn" class="flex items-center gap-1.5 md:gap-2 bg-cyan-600 hover:bg-cyan-500 px-4 md:px-6 py-2 md:py-2.5 rounded-full transition-all font-bold shadow-lg shadow-cyan-900/30 text-xs md:text-sm whitespace-nowrap shrink-0">
                    <i data-lucide="bluetooth" class="w-4 h-4 md:w-[1.125rem] md:h-[1.125rem]"></i> 連結裝置
                </button>
                <button type="button" id="disconnectBtn" class="hidden flex items-center gap-1.5 md:gap-2 bg-rose-600 hover:bg-rose-500 px-4 md:px-6 py-2 md:py-2.5 rounded-full transition-all font-bold shadow-lg text-xs md:text-sm whitespace-nowrap shrink-0">
                    <i data-lucide="unplug" class="w-4 h-4 md:w-[1.125rem] md:h-[1.125rem]"></i> 斷開
                </button>
                <div class="app-header-pills flex flex-wrap min-w-0 flex-1 md:flex-initial items-center gap-2 max-[768px]:justify-end">
                    <span id="connQualityPill" class="text-[11px] text-slate-400 bg-slate-800/70 border border-slate-600/60 rounded-full px-2.5 md:px-3 py-1 md:py-1.5 max-[768px]:max-w-[46%] truncate">連線品質：--</span>
                    <span id="actualFpsPill" class="text-[11px] text-slate-400 bg-slate-800/70 border border-slate-600/60 rounded-full px-2.5 md:px-3 py-1 md:py-1.5 max-[768px]:max-w-[46%] truncate">實測頻率：-- Hz</span>
                </div>
            </div>
        </header>

        <nav id="navDesktop" class="hidden md:flex flex-wrap gap-2 mb-6" aria-label="主要導覽"></nav>

        <main id="experiment-root" class="min-h-[50vh] space-y-3 md:space-y-4">
            <div id="view-projects" class="hidden" aria-label="實驗專案列表"></div>
            <div id="view-custom" class="hidden" aria-label="自訂實驗">
                <div class="glass-card rounded-xl border border-slate-600/30 p-4 max-w-xl">
                    <h2 class="text-base font-bold text-slate-100 mb-1">自訂實驗（外部卡帶）</h2>
                    <p class="text-[11px] text-slate-500 mb-3 leading-relaxed">
                        貼上可公開存取的 <strong class="text-slate-400">ES 模組</strong> URL（需允許 CORS）。模組須 export <code class="text-cyan-400/90">mount</code>／<code class="text-cyan-400/90">unmount</code> 或 <code class="text-cyan-400/90">cleanup</code>，並監聽 <code class="text-cyan-400/90">omnisense:data</code>（見 <code class="text-slate-500">docs/PROTOCOL.md</code>）。
                    </p>
                    <label class="sr-only" for="customModuleUrl">模組 URL</label>
                    <input type="url" id="customModuleUrl" name="customModuleUrl" inputmode="url" autocomplete="off" placeholder="https://example.com/my-experiment/app.js" class="w-full rounded-lg border border-slate-600 bg-slate-900/80 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/40 mb-3">
                    <button type="button" id="customLaunchBtn" class="w-full sm:w-auto rounded-lg bg-cyan-600 hover:bg-cyan-500 px-5 py-2.5 text-sm font-bold shadow-lg transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/60">啟動實驗</button>
                </div>
                <div class="max-w-xl mt-3 space-y-2" aria-label="專案資訊與聯絡">
                    <p class="text-xs text-slate-400">作者：蔡明勳（小威老師）</p>
                    <p class="text-xs text-slate-500 leading-relaxed">本專案採用 CC BY 4.0 國際授權條款釋出。歡迎在標註來源的前提下，自由分享、改作與使用。</p>
                    <a href="mailto:blackdogtr@gmail.com" class="inline-flex items-center gap-1.5 rounded-lg border border-slate-600/70 bg-slate-800/70 px-4 py-2 text-xs font-semibold text-slate-200 hover:bg-slate-700/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/40 w-fit">
                        <i data-lucide="mail" class="w-3.5 h-3.5" aria-hidden="true"></i>
                        寄信聯絡作者
                    </a>
                </div>
            </div>
            <div id="view-experiment-wrap">
                <div id="experiment-back-bar" class="hidden mb-2 flex items-center gap-2">
                    <button type="button" id="experimentBackBtn" class="inline-flex items-center gap-1.5 rounded-lg border border-slate-600/60 bg-slate-800/80 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-slate-700/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/40">
                        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> 返回
                    </button>
                </div>
                <div id="view-container" class="min-h-[50vh]"></div>
            </div>
        </main>
    </div>

    <nav id="navMobile" class="md:hidden fixed bottom-0 left-0 right-0 z-50 border-t border-slate-700/80 bg-slate-900/95 backdrop-blur-md pb-[env(safe-area-inset-bottom,0px)]" aria-label="主要導覽">
        <div id="navMobileInner" class="flex max-w-lg mx-auto"></div>
    </nav>

    <div id="pwaInstallBanner" class="fixed bottom-0 left-0 right-0 z-[100] hidden print:hidden" role="region" aria-label="安裝應用程式">
        <div class="mx-auto max-w-7xl px-3 sm:px-4">
            <div id="pwaInstallBannerInner" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 rounded-t-2xl bg-blue-600 text-white px-4 py-3 shadow-[0_-4px_24px_rgba(37,99,235,0.45)] border border-blue-500/30">
                <p class="text-sm leading-snug pr-1">將 <strong>OmniSense Lab</strong> 新增至主螢幕，之後可像 App 一樣快速開啟。</p>
                <div class="flex gap-2 shrink-0 justify-end">
                    <button type="button" id="pwaInstallDismiss" class="px-4 py-2 rounded-xl text-sm font-bold bg-white/15 hover:bg-white/25 transition-colors">稍後</button>
                    <button type="button" id="pwaInstallBtn" class="px-5 py-2 rounded-xl text-sm font-black bg-white text-blue-700 hover:bg-blue-50 transition-colors shadow-md">安裝</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {});
            });
        }
        const PWA_DISMISS_KEY = 'omnisense_pwa_install_dismissed_v1';
        let deferredInstallPrompt = null;
        function isStandalonePwa() {
            return window.matchMedia('(display-mode: standalone)').matches ||
                window.matchMedia('(display-mode: fullscreen)').matches ||
                window.matchMedia('(display-mode: minimal-ui)').matches ||
                (window.navigator.standalone === true);
        }
        (function tryFullscreenForBluefy() {
            let done = false;
            function go() {
                if (done) return;
                const el = document.documentElement;
                if (document.fullscreenElement || !el.requestFullscreen) return;
                done = true;
                el.requestFullscreen().catch(() => { done = false; });
            }
            window.addEventListener('load', () => setTimeout(go, 400));
            window.addEventListener('click', go, { capture: true, once: true });
            window.addEventListener('touchstart', go, { capture: true, once: true });
        })();
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (isStandalonePwa()) return;
            if (localStorage.getItem(PWA_DISMISS_KEY)) return;
            document.getElementById('pwaInstallBanner')?.classList.remove('hidden');
        });
        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.add('hidden');
        });
        document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            try { await deferredInstallPrompt.userChoice; } catch (_) {}
            deferredInstallPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.add('hidden');
        });
        document.getElementById('pwaInstallDismiss')?.addEventListener('click', () => {
            localStorage.setItem(PWA_DISMISS_KEY, '1');
            document.getElementById('pwaInstallBanner')?.classList.add('hidden');
        });
    </script>
    <script type="module" src="./shell.js"></script>
</body>
</html>
