<div id="dashboardRoot" class="grid grid-cols-1 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-6">
    <div id="dashboardSidebar" class="lg:col-span-1 flex flex-col gap-2 md:gap-3 min-w-0">
        <div class="glass-card p-2 sm:p-2.5 rounded-lg shadow-lg border border-slate-600/25 ring-1 ring-white/[0.04]">
            <div class="flex items-center justify-between gap-2 pb-1.5 mb-1.5 border-b border-slate-700/50">
                <div class="flex items-center gap-1 min-w-0">
                    <i data-lucide="cpu" class="w-3 h-3 text-cyan-400 shrink-0"></i>
                    <h2 class="text-[11px] font-bold text-slate-100 tracking-tight truncate">腳位診斷</h2>
                </div>
                <div class="flex items-center gap-0.5 shrink-0 text-slate-500" title="模式：一般／上拉／觸控" aria-label="模式圖例">
                    <span class="inline-flex p-0.5 rounded bg-slate-800/80 border border-slate-600/50" title="一般"><i data-lucide="gauge" class="w-2.5 h-2.5"></i></span>
                    <span class="inline-flex p-0.5 rounded bg-slate-800/80 border border-slate-600/50" title="上拉"><i data-lucide="magnet" class="w-2.5 h-2.5"></i></span>
                    <span class="inline-flex p-0.5 rounded bg-slate-800/80 border border-slate-600/50" title="觸控"><i data-lucide="fingerprint" class="w-2.5 h-2.5"></i></span>
                </div>
            </div>

            <div class="divide-y divide-slate-700/35">
                <div class="pb-1.5">
                    <div class="flex items-center justify-between gap-2 mb-1">
                        <span class="text-[8px] font-semibold uppercase tracking-wider text-cyan-400/95">類比</span>
                        <span class="text-[7px] text-slate-600 tabular-nums">ADC</span>
                    </div>
                    <div id="pins-analog-four" class="grid grid-cols-2 gap-x-1.5 gap-y-1"></div>
                </div>

                <div class="pt-1.5 pb-1.5">
                    <div class="flex items-center gap-1.5 min-h-[34px]">
                        <span class="text-[8px] font-semibold text-amber-400/95 leading-none w-[4.25rem] shrink-0">支援 10kΩ</span>
                        <div id="pins-g2" class="flex-1 min-w-0"></div>
                    </div>
                </div>

                <div class="pt-1.5">
                    <div class="flex items-center justify-between gap-1 mb-1">
                        <span class="text-[8px] font-semibold uppercase tracking-wider text-emerald-400/95">數位</span>
                        <span class="text-[7px] text-slate-600 truncate">弱上拉恆開</span>
                    </div>
                    <div id="pins-digital" class="grid grid-cols-4 gap-1"></div>
                </div>
            </div>
        </div>
        <div class="glass-card p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-xl border border-white/[0.06] space-y-3">
            <div>
                <label class="text-[11px] font-semibold text-slate-400">取樣 <span id="freqLabel" class="text-cyan-400 font-mono tabular-nums">50</span> Hz</label>
                <input type="range" id="freqRange" min="10" max="200" value="50" class="w-full mt-1.5 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
            </div>
            <div>
                <label class="text-[11px] font-semibold text-slate-400 mb-1 block">資料解析度</label>
                <select id="resSelect" class="w-full bg-slate-800/90 border border-slate-600/80 rounded-lg px-2.5 py-2 text-[13px] text-slate-100 outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/40">
                    <option value="0">8-bit（高速數位）</option>
                    <option value="1" selected>12-bit（標準實驗）</option>
                    <option value="2">16-bit（精密分析）</option>
                </select>
            </div>
            <div>
                <label class="text-[11px] font-semibold text-slate-400 mb-1 block">濾波（類比）</label>
                <select id="filterSelect" class="w-full bg-slate-800/90 border border-slate-600/80 rounded-lg px-2.5 py-2 text-[13px] text-slate-100 outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/40">
                    <option value="none">無</option>
                    <option value="ma">移動平均</option>
                    <option value="kalman" selected>卡爾曼</option>
                </select>
            </div>
            <button type="button" id="applyBtn" class="w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-lg text-sm font-bold tracking-wide shadow-md active:scale-[0.98] transition-transform focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/80">
                應用配置
            </button>
        </div>
    </div>
    <div class="lg:col-span-3 space-y-2 md:space-y-3 min-w-0">
        <div class="glass-card p-2 sm:p-4 md:p-5 rounded-xl sm:rounded-2xl shadow-xl border border-white/[0.06]">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-1 md:mb-2">
                <div class="flex items-center gap-2">
                    <i data-lucide="line-chart" class="text-cyan-400 w-4 h-4 sm:w-[18px] sm:h-[18px] shrink-0"></i>
                    <h2 id="waveSectionTitle" class="text-sm sm:text-base md:text-lg font-bold text-slate-100">即時感測波形</h2>
                </div>
                <div id="toolbarActions" class="dash-toolbar flex flex-wrap sm:flex-nowrap gap-2 md:gap-2 w-full sm:w-auto min-w-0 overflow-x-auto sm:overflow-visible pb-0.5 sm:pb-0 [-webkit-overflow-scrolling:touch]">
                    <button type="button" id="sidebarToggleBtn" class="dash-tool-btn text-[10px] font-semibold bg-slate-700/60 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg hover:bg-slate-600/80 min-h-[34px] sm:min-h-[38px] inline-flex items-center justify-center gap-1 sm:gap-1.5 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400/50 shrink-0" title="收合或展開側欄">
                        <i data-lucide="panel-left-close" class="w-3.5 h-3.5"></i>
                        <span>側欄</span>
                    </button>
                    <button type="button" id="waveAutoBtn" class="dash-tool-btn text-[10px] font-semibold bg-slate-700/60 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg hover:bg-slate-600/80 min-h-[34px] sm:min-h-[38px] inline-flex items-center justify-center gap-1 sm:gap-1.5 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400/50 shrink-0" title="追蹤（開關）" aria-pressed="false">
                        <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                        <span>追蹤</span>
                    </button>
                    <button type="button" id="rawOverlayBtn" class="dash-tool-btn text-[10px] font-semibold bg-slate-700/60 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg hover:bg-slate-600/80 min-h-[34px] sm:min-h-[38px] inline-flex items-center justify-center gap-1 sm:gap-1.5 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400/50 shrink-0" aria-pressed="false">
                        <i data-lucide="activity" class="w-3.5 h-3.5"></i>
                        <span>原始</span>
                    </button>
                    <button type="button" id="clearBtn" class="dash-tool-btn text-[10px] font-semibold bg-slate-700/60 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg hover:bg-slate-600/80 min-h-[34px] sm:min-h-[38px] focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400/50 shrink-0">清除</button>
                    <button type="button" id="exportBtn" class="dash-tool-btn dash-tool-btn--wide text-[10px] font-semibold bg-emerald-600/85 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg hover:bg-emerald-500 min-h-[34px] sm:min-h-[38px] focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400/50 shrink-0">導出 CSV</button>
                </div>
            </div>
            <div id="waveZoomManual" class="space-y-2 mb-1 md:mb-2 px-0.5">
                <div class="flex items-center justify-between gap-2">
                    <p class="text-[10px] text-slate-500">縱軸縮放（數值 0～4095，收窄區間可放大波形）</p>
                    <button type="button" id="waveZoomResetBtn" class="text-[10px] font-semibold bg-slate-700/60 px-2.5 py-1.5 rounded-lg hover:bg-slate-600/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400/50" title="縱軸恢復 0～4095">縱軸全幅</button>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-center gap-1.5 sm:gap-3">
                    <label for="waveYMin" class="text-[10px] font-semibold text-slate-400 shrink-0 w-[4.5rem]">下限</label>
                    <input type="range" id="waveYMin" min="0" max="4094" value="0" class="flex-1 min-w-0 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                    <span id="waveYMinLabel" class="text-[10px] font-mono tabular-nums text-cyan-400/90 w-9 text-right shrink-0">0</span>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-center gap-1.5 sm:gap-3">
                    <label for="waveYMax" class="text-[10px] font-semibold text-slate-400 shrink-0 w-[4.5rem]">上限</label>
                    <input type="range" id="waveYMax" min="1" max="4095" value="4095" class="flex-1 min-w-0 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                    <span id="waveYMaxLabel" class="text-[10px] font-mono tabular-nums text-cyan-400/90 w-9 text-right shrink-0">4095</span>
                </div>
            </div>
            <div id="canvasParent" class="dash-chart-host canvas-container w-full aspect-[16/10] sm:aspect-[21/9] bg-slate-950 rounded-lg border border-slate-800/80 overflow-hidden mt-0 md:mt-1"></div>
            <div class="mt-1.5 md:mt-2 text-[10px] text-slate-500 flex flex-wrap gap-x-3 md:gap-x-4 gap-y-1">
                <span id="actualFreqLabel">實測頻率：-- Hz</span>
                <span id="linkQualityLabel">連線品質：--</span>
            </div>
        </div>
        <div id="dashboardCardsWrap" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-2"></div>
    </div>
</div>
