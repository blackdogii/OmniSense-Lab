<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSense Lab - 專業科學主控台</title>
    
    <!-- PWA：可安裝、Chrome 網址列安裝圖示需有效 manifest + SW + 192/512 圖示 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <meta name="theme-color" content="#0f172a">
    <meta name="application-name" content="OmniSense Lab">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- iOS 專用全螢幕設定 -->

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OmniSense">

    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .canvas-container canvas { border-radius: 1rem; width: 100% !important; height: auto !important; }

        /* 避免手機上按鈕被手勢或重疊層吃掉點擊 */
        #toolbarActions button { position: relative; z-index: 40; pointer-events: auto; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        #pwaInstallBanner { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- 頁首 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-cyan-500 p-2 rounded-xl shadow-lg shadow-cyan-500/20">
                    <i data-lucide="microscope" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-cyan-400 tracking-tight">OmniSense Lab</h1>
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-widest italic">Professional Research Edition</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button type="button" id="connectBtn" class="flex items-center gap-2 bg-cyan-600 hover:bg-cyan-500 px-6 py-2.5 rounded-full transition-all font-bold shadow-lg shadow-cyan-900/30">
                    <i data-lucide="bluetooth"></i> 連結裝置
                </button>
                <button type="button" id="disconnectBtn" class="hidden flex items-center gap-2 bg-rose-600 hover:bg-rose-500 px-6 py-2.5 rounded-full transition-all font-bold shadow-lg">
                    <i data-lucide="unplug"></i> 斷開
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- 側邊欄 -->
            <div class="lg:col-span-1 flex flex-col gap-6">
                
                <!-- 腳位選擇區域 -->
                <div class="glass-card p-6 rounded-3xl shadow-2xl">
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-700/50 pb-3">
                        <i data-lucide="cpu" class="w-4 h-4 text-cyan-400"></i>
                        <h2 class="text-sm font-bold text-slate-200">腳位診斷 (按分類)</h2>
                    </div>

                    <!-- 類比分類 -->
                    <div class="mb-5">
                        <p class="text-[10px] font-bold text-cyan-500 uppercase mb-2 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></span> 類比輸入 (ADC1)
                        </p>
                        <div class="grid grid-cols-2 gap-2" id="group-analog"></div>
                    </div>

                    <!-- 支援分類 -->
                    <div class="mb-5">
                        <p class="text-[10px] font-bold text-amber-500 uppercase mb-2 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span> 支援/複合 (Hybrid)
                        </p>
                        <div class="grid grid-cols-2 gap-2" id="group-support"></div>
                    </div>

                    <!-- 數位分類 -->
                    <div class="mb-5">
                        <p class="text-[10px] font-bold text-emerald-500 uppercase mb-2 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> 數位輸入 (Input)
                        </p>
                        <div class="grid grid-cols-2 gap-2" id="group-digital"></div>
                    </div>
                </div>

                <!-- 配置面板 -->
                <div class="glass-card p-6 rounded-3xl shadow-2xl space-y-6">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-xs font-bold text-slate-400">取樣頻率: <span id="freqLabel" class="text-cyan-400 font-mono">50</span> Hz</label>
                        </div>
                        <input type="range" id="freqRange" min="10" max="200" value="50" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-3 block text-center">資料解析度模式</label>
                        <select id="resSelect" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none">
                            <option value="0">8-bit (高速數位)</option>
                            <option value="1" selected>12-bit (標準實驗)</option>
                            <option value="2">16-bit (精密分析)</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-3 block text-center">波形濾波（類比／Hybrid 通道）</label>
                        <select id="filterSelect" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none">
                            <option value="none">無</option>
                            <option value="ma">移動平均（窗長 8）</option>
                            <option value="kalman" selected>卡爾曼（1D，預設 Q/R）</option>
                        </select>
                        <p class="text-[10px] text-slate-500 mt-2 leading-relaxed">數位輸入通道維持原始 0／4095，不套用濾波。</p>
                    </div>

                    <button type="button" id="applyBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-2xl font-black text-sm uppercase transition-all shadow-xl active:scale-95">
                        應用配置
                    </button>
                    <div id="syncIndicator" class="text-center text-[10px] text-slate-500 italic">
                        <i data-lucide="refresh-cw" class="w-3 h-3 inline"></i> 尚未同步
                    </div>
                </div>
            </div>

            <!-- 主繪圖區 -->
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-card p-6 rounded-[2rem] shadow-2xl relative">
                    <div class="flex justify-between items-center mb-6 relative z-30">
                        <div class="flex items-center gap-3">
                            <i data-lucide="line-chart" class="text-cyan-400"></i>
                            <h2 class="text-xl font-bold">即時感測波形</h2>
                        </div>
                        <div id="toolbarActions" class="flex gap-2">
                            <button type="button" id="clearBtn" class="text-[9px] font-bold bg-slate-700/50 px-4 py-2 rounded-xl hover:bg-slate-700 transition-colors uppercase min-h-[36px] min-w-[4rem]">清除</button>
                            <button type="button" id="exportBtn" class="text-[9px] font-bold bg-emerald-600/80 px-4 py-2 rounded-xl hover:bg-emerald-600 transition-colors uppercase min-h-[36px] min-w-[4rem]">導出 CSV</button>
                        </div>
                    </div>
                    <div id="canvasParent" class="canvas-container w-full aspect-[21/9] bg-slate-950 rounded-2xl border border-slate-800 overflow-hidden relative z-0"></div>
                </div>

                <!-- 數據卡片 -->
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="dataCards"></div>
            </div>
        </div>
    </div>

    <!-- PWA：Chrome 可安裝時由 beforeinstallprompt 顯示（與網址列安裝圖示同源條件） -->
    <div id="pwaInstallBanner" class="fixed bottom-0 left-0 right-0 z-[100] hidden print:hidden" role="region" aria-label="安裝應用程式">
        <div class="mx-auto max-w-7xl px-3 sm:px-4">
            <div id="pwaInstallBannerInner" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 rounded-t-2xl bg-blue-600 text-white px-4 py-3 shadow-[0_-4px_24px_rgba(37,99,235,0.45)] border border-blue-500/30">
                <p class="text-sm leading-snug pr-1">
                    將 <strong>OmniSense Lab</strong> 新增至主螢幕，之後可像 App 一樣快速開啟實驗主控台。
                </p>
                <div class="flex gap-2 shrink-0 justify-end">
                    <button type="button" id="pwaInstallDismiss" class="px-4 py-2 rounded-xl text-sm font-bold bg-white/15 hover:bg-white/25 transition-colors">稍後</button>
                    <button type="button" id="pwaInstallBtn" class="px-5 py-2 rounded-xl text-sm font-black bg-white text-blue-700 hover:bg-blue-50 transition-colors shadow-md">安裝</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. PWA Service Worker（scope 與 manifest 一致，利於「可安裝」判定）---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('./sw.js', { scope: './' })
                    .then((reg) => console.log('PWA Service Worker 已註冊', reg.scope))
                    .catch((err) => console.log('PWA Service Worker 註冊失敗', err));
            });
        }

        const PWA_DISMISS_KEY = 'omnisense_pwa_install_dismissed_v1';
        let deferredInstallPrompt = null;

        function isStandalonePwa() {
            return (
                window.matchMedia('(display-mode: standalone)').matches ||
                window.matchMedia('(display-mode: minimal-ui)').matches ||
                (window.navigator.standalone === true)
            );
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (isStandalonePwa()) return;
            if (localStorage.getItem(PWA_DISMISS_KEY)) return;
            const bar = document.getElementById('pwaInstallBanner');
            if (bar) bar.classList.remove('hidden');
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.add('hidden');
        });

        function wirePwaInstallUi() {
            document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
                if (!deferredInstallPrompt) return;
                deferredInstallPrompt.prompt();
                try {
                    await deferredInstallPrompt.userChoice;
                } catch (_) {}
                deferredInstallPrompt = null;
                document.getElementById('pwaInstallBanner')?.classList.add('hidden');
            });
            document.getElementById('pwaInstallDismiss')?.addEventListener('click', () => {
                localStorage.setItem(PWA_DISMISS_KEY, '1');
                document.getElementById('pwaInstallBanner')?.classList.add('hidden');
            });
        }
        wirePwaInstallUi();

        // --- 2. 核心變數 ---
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const TX_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";
        const RX_UUID = "0000ffe2-0000-1000-8000-00805f9b34fb";
        
        const PINS_CONFIG = [
            { id: 0, gpio: 0, type: 'analog' },
            { id: 1, gpio: 1, type: 'analog' },
            { id: 2, gpio: 2, type: 'support' },
            { id: 3, gpio: 3, type: 'analog' },
            { id: 4, gpio: 4, type: 'analog' },
            { id: 5, gpio: 8, type: 'digital' },
            { id: 6, gpio: 9, type: 'digital' },
            { id: 7, gpio: 20, type: 'digital' },
            { id: 8, gpio: 21, type: 'digital' }
        ];

        let bleDevice, txChar, rxChar;
        let activeMask = 0x0001;
        let dataHistory = Array.from({length: 9}, () => []);
        const MAX_HISTORY = 100;
        const MA_WINDOW = 8;

        /** 邏輯通道 id：GPIO 0,1,3,4（類比）懸空時易亂跳 — 以滑動視窗偵測並用中位數抑制 */
        const FLOATING_ADC_IDS = new Set([0, 1, 3, 4]);
        const FLOAT_WIN = 16;
        const FLOAT_SPAN_THRESH = 120;
        const floatRawBuf = Array.from({ length: 9 }, () => []);

        function resetFloatingBuffers() {
            for (let i = 0; i < 9; i++) floatRawBuf[i].length = 0;
        }

        /**
         * GPIO 0,1,3,4：懸空時 ADC 易亂跳。累積視窗後一律以「中位數」輸出以抑制毛刺；
         * span 過大時標記 floating 供提示（再交給卡爾曼／MA）。
         */
        function stabilizeFloatingAnalog(raw, id) {
            if (!FLOATING_ADC_IDS.has(id)) return { v: raw, floating: false };
            const buf = floatRawBuf[id];
            buf.push(raw);
            if (buf.length > FLOAT_WIN) buf.shift();
            if (buf.length < 3) return { v: raw, floating: false };
            const sorted = [...buf].sort((a, b) => a - b);
            const med = sorted[Math.floor(sorted.length / 2)];
            const span = sorted[sorted.length - 1] - sorted[0];
            const floating = span > FLOAT_SPAN_THRESH;
            return { v: med, floating };
        }

        /** 單通道 1D 卡爾曼（觀測為 0–4095 類比量） */
        function createKalman1D(processNoise, measNoise) {
            let x = null;
            let P = 1;
            const Q = processNoise;
            const R = measNoise;
            return function (z) {
                if (x === null) x = z;
                P = P + Q;
                const K = P / (P + R);
                x = x + K * (z - x);
                P = (1 - K) * P;
                return Math.round(x);
            };
        }

        function createMovingAverage(windowSize) {
            const buf = [];
            return function (z) {
                buf.push(z);
                if (buf.length > windowSize) buf.shift();
                let s = 0;
                for (let i = 0; i < buf.length; i++) s += buf[i];
                return Math.round(s / buf.length);
            };
        }

        let channelFilters = [];

        function rebuildChannelFilters() {
            const mode = document.getElementById('filterSelect')?.value || 'kalman';
            channelFilters = PINS_CONFIG.map((p) => {
                if (p.type === 'digital') return (z) => z;
                if (mode === 'none') return (z) => z;
                if (mode === 'ma') return createMovingAverage(MA_WINDOW);
                return createKalman1D(4, 64);
            });
        }

        // --- 3. 藍牙數據解析 (BitUnpacker)，與韌體 BitPacker 對齊 ---
        function unpack(view) {
            if(view.getUint8(0) !== 0xAA) return null;
            const mask = (view.getUint8(1) << 8) | view.getUint8(2);
            const res = view.getUint8(3);
            const ts = view.getUint32(4, true);
            const values = []; let pos = 8;
            let count = 0; for(let i=0; i<9; i++) if((mask >> i) & 1) count++;

            if(res === 0) {
                for(let i=0; i<count; i++) values.push(view.getUint8(pos++) << 4);
            } else if(res === 1) {
                for(let i=0; i<count; i+=2) {
                    const b1 = view.getUint8(pos++), b2 = view.getUint8(pos++), b3 = view.getUint8(pos++);
                    values.push((b1 << 4) | (b2 >> 4));
                    if(values.length < count) values.push(((b2 & 0x0F) << 8) | b3);
                }
            } else {
                for(let i=0; i<count; i++) values.push((view.getUint8(pos++) << 8) | view.getUint8(pos++));
            }
            return { ts, mask, values };
        }

        function clearWaveform(ev) {
            if (ev) ev.preventDefault();
            for (let i = 0; i < 9; i++) dataHistory[i].length = 0;
            resetFloatingBuffers();
            rebuildChannelFilters();
            const el = document.getElementById('syncIndicator');
            if (el) el.innerText = '已清除波形緩衝';
        }

        function buildCsvText() {
            const maxLen = dataHistory.reduce((m, h) => Math.max(m, h.length), 0);
            const gpioHeader = PINS_CONFIG.map((p) => `GPIO${p.gpio}`);
            const header = ['sample_index', ...gpioHeader];
            const lines = [header.join(',')];
            for (let r = 0; r < maxLen; r++) {
                const row = [r];
                for (let i = 0; i < 9; i++) {
                    const h = dataHistory[i];
                    row.push(h.length > r ? h[r] : '');
                }
                lines.push(row.join(','));
            }
            return '\ufeff' + lines.join('\n');
        }

        async function exportCsv(ev) {
            if (ev) ev.preventDefault();
            const maxLen = dataHistory.reduce((m, h) => Math.max(m, h.length), 0);
            if (maxLen === 0) {
                alert('尚無資料可匯出，請先連線並接收資料。');
                return;
            }
            const csv = buildCsvText();
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const baseName = `OmniSense_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
            const file = new File([blob], baseName, { type: 'text/csv' });

            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: baseName,
                        types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    document.getElementById('syncIndicator').innerText = '已儲存 CSV（由系統選擇位置）';
                    return;
                }
            } catch (e) {
                if (e && e.name === 'AbortError') return;
                console.warn('showSaveFilePicker', e);
            }

            try {
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'OmniSense Lab CSV', text: '匯出感測資料' });
                    document.getElementById('syncIndicator').innerText = '已開啟系統分享（可存檔或傳送）';
                    return;
                }
            } catch (e) {
                if (e && e.name === 'AbortError') return;
                console.warn('navigator.share', e);
            }

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = baseName;
            a.rel = 'noopener';
            document.body.appendChild(a);
            a.click();
            requestAnimationFrame(() => {
                URL.revokeObjectURL(url);
                a.remove();
            });
            document.getElementById('syncIndicator').innerText = '已觸發下載（若手機無另存新檔，請用分享鈕）';
        }

        async function disconnectBle() {
            try {
                if (bleDevice && bleDevice.gatt.connected) await bleDevice.gatt.disconnect();
            } catch (e) { console.log(e); }
            txChar = rxChar = null;
            bleDevice = null;
            document.getElementById('connectBtn').classList.remove('hidden');
            document.getElementById('disconnectBtn').classList.add('hidden');
            document.getElementById('syncIndicator').innerText = '已斷開藍牙';
        }

        // --- 4. BLE 操作 ---
        async function connect() {
            try {
                rebuildChannelFilters();
                resetFloatingBuffers();
                // iPhone：須能依「服務 UUID」掃到裝置，韌體須把 FFE0 放進廣播／Scan Response
                // 修改為只根據 UUID 篩選，徹底解除藍牙名稱的綁定
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [
                        { services: [SERVICE_UUID] }
                    ]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txChar = await service.getCharacteristic(TX_UUID);
                rxChar = await service.getCharacteristic(RX_UUID);

                bleDevice.addEventListener('gattserverdisconnected', () => {
                    disconnectBle();
                });

                await txChar.startNotifications();
                txChar.addEventListener('characteristicvaluechanged', (e) => {
                    const d = unpack(e.target.value);
                    if (!d) return;
                    let vIdx = 0;
                    for (let i = 0; i < 9; i++) {
                        if ((d.mask >> i) & 1) {
                            const raw = d.values[vIdx++];
                            const { v: pre, floating } = stabilizeFloatingAnalog(raw, i);
                            const val = channelFilters[i] ? channelFilters[i](pre) : pre;
                            dataHistory[i].push(val);
                            if (dataHistory[i].length > MAX_HISTORY) dataHistory[i].shift();
                            const el = document.getElementById(`val-${i}`);
                            if (el) el.innerText = val;
                            const hint = document.getElementById(`float-hint-${i}`);
                            if (hint) {
                                if (FLOATING_ADC_IDS.has(i) && floating) {
                                    hint.classList.remove('hidden');
                                    hint.innerText = '可能懸空（已抑制雜訊）';
                                } else {
                                    hint.classList.add('hidden');
                                }
                            }
                        }
                    }
                });
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('disconnectBtn').classList.remove('hidden');
                document.getElementById('syncIndicator').innerText = '✅ 裝置已就緒';
            } catch (e) {
                console.log(e);
            }
        }

        async function apply() {
            if(!rxChar) return;
            const f = parseInt(document.getElementById('freqRange').value);
            const r = parseInt(document.getElementById('resSelect').value);
            const buf = new Uint8Array([0x01, (activeMask >> 8) & 0xFF, activeMask & 0xFF, (f >> 8) & 0xFF, f & 0xFF, r]);
            await rxChar.writeValue(buf);
            document.getElementById('syncIndicator').innerText = "⚡ 同步完成";
        }

        // --- 5. 圖表繪製 ---
        new p5((p) => {
            p.setup = () => {
                const par = document.getElementById('canvasParent');
                p.createCanvas(par.offsetWidth, par.offsetHeight).parent(par);
            };
            p.draw = () => {
                p.background(10, 15, 30);
                const colors = ['#22d3ee', '#818cf8', '#f59e0b', '#34d399', '#f472b6', '#10b981', '#10b981', '#3b82f6', '#3b82f6'];
                p.strokeWeight(2.5);
                for(let i=0; i<9; i++) {
                    if(!((activeMask >> i) & 1)) continue;
                    p.stroke(colors[i]); p.noFill(); p.beginShape();
                    dataHistory[i].forEach((v, idx) => {
                        p.vertex(p.map(idx, 0, MAX_HISTORY, 0, p.width), p.map(v, 0, 4095, p.height-30, 30));
                    });
                    p.endShape();
                }
            };
        });

        // --- 6. UI 初始化（DOMContentLoaded：避免腳本早於節點執行導致按鈕無效）---
        function initUi() {
            PINS_CONFIG.forEach((p) => {
                const group = document.getElementById(`group-${p.type}`);
                const btn = document.createElement('button');
                btn.id = `btn-${p.id}`;
                btn.innerHTML = `<span class="opacity-40">G</span>${p.gpio}`;
                btn.className = `pin-btn p-2 rounded-xl border text-[10px] font-bold ${p.id === 0 ? 'bg-cyan-500 border-cyan-400' : 'border-slate-700 text-slate-500'}`;
                btn.onclick = () => toggle(p.id);
                group.appendChild(btn);

                const cards = document.getElementById('dataCards');
                const c = document.createElement('div');
                c.id = `card-${p.id}`;
                c.className = `glass-card p-4 rounded-2xl transition-all ${p.id === 0 ? '' : 'opacity-20'}`;
                c.innerHTML = `<p class="text-[9px] font-black text-slate-500 uppercase">GPIO ${p.gpio}</p><p id="val-${p.id}" class="text-2xl font-mono font-bold text-slate-100">---</p><p id="float-hint-${p.id}" class="text-[8px] text-amber-400/90 mt-1 min-h-[1rem] hidden"></p>`;
                cards.appendChild(c);
            });
            lucide.createIcons();
            rebuildChannelFilters();
            document.getElementById('filterSelect').onchange = () => {
                rebuildChannelFilters();
                document.getElementById('syncIndicator').innerText = '已切換濾波（緩衝重算於下筆資料）';
            };
            const bind = (id, fn) => {
                const n = document.getElementById(id);
                if (!n) return;
                n.addEventListener('click', fn, { passive: false });
            };
            bind('connectBtn', connect);
            bind('disconnectBtn', disconnectBle);
            bind('applyBtn', apply);
            bind('clearBtn', clearWaveform);
            bind('exportBtn', exportCsv);
            document.getElementById('freqRange').addEventListener('input', (e) => {
                document.getElementById('freqLabel').innerText = e.target.value;
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initUi);
        } else {
            initUi();
        }

        function toggle(id) {
            activeMask ^= (1 << id);
            const active = (activeMask >> id) & 1;
            const p = PINS_CONFIG[id];
            const colorClass = p.type === 'analog' ? 'bg-cyan-500 border-cyan-400 text-white' : 
                               p.type === 'support' ? 'bg-amber-500 border-amber-400 text-white' : 'bg-emerald-600 border-emerald-500 text-white';
            
            document.getElementById(`btn-${id}`).className = `pin-btn p-2 rounded-xl border text-[10px] font-bold ${active ? colorClass : 'border-slate-700 text-slate-500'}`;
            document.getElementById(`card-${id}`).style.opacity = active ? "1" : "0.2";
            document.getElementById('syncIndicator').innerText = '⚠️ 腳位已變動，請按「應用配置」同步';
        }
    </script>
</body>
