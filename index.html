<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSense Lab - 全感官實驗室</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- p5.js for Real-time Graphing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .canvas-container canvas { border-radius: 0.5rem; width: 100% !important; height: auto !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400">OmniSense Lab</h1>
                <p class="text-slate-400 text-sm">全感官實驗室 - 無線感測主控台</p>
            </div>
            <div class="flex gap-2">
                <button id="connectBtn" class="flex items-center gap-2 bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-full transition-all font-bold">
                    <i data-lucide="bluetooth"></i> 連結裝置
                </button>
                <button id="disconnectBtn" class="hidden flex items-center gap-2 bg-red-600 hover:bg-red-500 px-6 py-2 rounded-full transition-all font-bold">
                    <i data-lucide="link-2-off"></i> 斷開連線
                </button>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Left: System Controls -->
            <div class="glass-card p-6 rounded-2xl shadow-xl flex flex-col gap-6">
                <h2 class="text-xl font-semibold flex items-center gap-2 border-b border-slate-700 pb-2">
                    <i data-lucide="settings"></i> 系統配置
                </h2>
                
                <!-- Channels Toggle -->
                <div>
                    <p class="text-sm text-slate-400 mb-3">啟用腳位 (GPIO)</p>
                    <div class="grid grid-cols-3 gap-2" id="channelGrid">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <!-- Frequency & Resolution -->
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-slate-400 flex justify-between">
                            取樣頻率: <span id="freqLabel">100 Hz</span>
                        </label>
                        <input type="range" id="freqRange" min="10" max="500" value="100" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-400">
                    </div>
                    <div>
                        <label class="text-sm text-slate-400">解析度 (Bit Depth)</label>
                        <select id="resSelect" class="w-full bg-slate-800 border border-slate-700 rounded-md p-2 mt-1 focus:ring-2 focus:ring-cyan-500">
                            <option value="0">8-bit (高速遊戲模式)</option>
                            <option value="1" selected>12-bit (標準平衡模式)</option>
                            <option value="2">16-bit (精密研究模式)</option>
                        </select>
                    </div>
                </div>

                <button id="applyBtn" class="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors font-medium">
                    應用設定
                </button>
            </div>

            <!-- Middle/Right: Real-time Graph -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="glass-card p-4 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i data-lucide="activity"></i> 即時數據波形
                        </h2>
                        <div class="flex gap-2">
                            <button id="clearBtn" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600">清除</button>
                            <button id="exportBtn" class="text-xs bg-cyan-700 px-3 py-1 rounded hover:bg-cyan-600">匯出 CSV</button>
                        </div>
                    </div>
                    <div id="canvasParent" class="canvas-container w-full aspect-video bg-black rounded-lg overflow-hidden">
                        <!-- p5.js Canvas will go here -->
                    </div>
                </div>

                <!-- Live Data Cards -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="dataCards">
                    <!-- Cards will be added here dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- UI Logic & BLE Core -->
    <script>
        // --- 1. Constants & State ---
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const TX_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";
        const RX_UUID = "0000ffe2-0000-1000-8000-00805f9b34fb";

        let bleDevice, txChar, rxChar;
        let activeMask = 0x01; // Default Channel 0
        let currentRes = 1;    // Default 12-bit
        let dataHistory = [[], [], [], [], [], []];
        const MAX_HISTORY = 300;

        // --- 2. BitUnpacker Logic (對應 ESP32 BitPacker.cpp) ---
        function unpackData(view) {
            const header = view.getUint8(0);
            if (header !== 0xAA) return null;

            const config = view.getUint8(1);
            const res = (config >> 6) & 0x03;
            const mask = config & 0x3F;
            const timestamp = view.getUint32(2, true); // Little Endian
            
            const rawValues = [];
            let pos = 6;
            let activeCount = 0;
            for(let i=0; i<6; i++) if((mask >> i) & 1) activeCount++;

            if (res === 0) { // 8-bit
                for (let i = 0; i < activeCount; i++) rawValues.push(view.getUint8(pos++) << 4);
            } else if (res === 1) { // 12-bit
                for (let i = 0; i < activeCount; i += 2) {
                    const b1 = view.getUint8(pos++);
                    const b2 = view.getUint8(pos++);
                    const b3 = view.getUint8(pos++);
                    rawValues.push((b1 << 4) | (b2 >> 4));
                    if (rawValues.length < activeCount) rawValues.push(((b2 & 0x0F) << 8) | b3);
                }
            } else { // 16-bit
                for (let i = 0; i < activeCount; i++) {
                    rawValues.push((view.getUint8(pos++) << 8) | view.getUint8(pos++));
                }
            }

            return { timestamp, mask, values: rawValues };
        }

        // --- 3. BLE Operations ---
        async function connectBLE() {
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'OmniSense-Base' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                txChar = await service.getCharacteristic(TX_UUID);
                rxChar = await service.getCharacteristic(RX_UUID);

                await txChar.startNotifications();
                txChar.addEventListener('characteristicvaluechanged', handleNotify);

                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('disconnectBtn').classList.remove('hidden');
                console.log("裝置已連接");
            } catch (error) {
                console.error("連線失敗:", error);
            }
        }

        function handleNotify(event) {
            const result = unpackData(event.target.value);
            if (!result) return;

            const { timestamp, mask, values } = result;
            let valIdx = 0;
            for (let i = 0; i < 6; i++) {
                if ((mask >> i) & 1) {
                    const val = values[valIdx++];
                    dataHistory[i].push({ t: timestamp, v: val });
                    if (dataHistory[i].length > MAX_HISTORY) dataHistory[i].shift();
                    
                    // Update UI Card
                    const card = document.getElementById(`card-${i}`);
                    if (card) card.querySelector('.val-text').innerText = val;
                }
            }
        }

        async function sendConfig() {
            if (!rxChar) return;
            const freq = parseInt(document.getElementById('freqRange').value);
            const res = parseInt(document.getElementById('resSelect').value);
            
            const buffer = new Uint8Array([
                0x01, // CMD_SET_CONFIG
                activeMask,
                (freq >> 8) & 0xFF,
                freq & 0xFF,
                res
            ]);
            await rxChar.writeValue(buffer);
            console.log("配置已發送");
        }

        // --- 4. p5.js Rendering ---
        new p5((p) => {
            p.setup = () => {
                const parent = document.getElementById('canvasParent');
                const canvas = p.createCanvas(parent.offsetWidth, parent.offsetHeight);
                canvas.parent(parent);
            };

            p.draw = () => {
                p.background(0);
                p.noFill();
                p.strokeWeight(2);

                const colors = ['#22d3ee', '#818cf8', '#fb7185', '#34d399', '#fbbf24', '#a78bfa'];
                
                for (let i = 0; i < 6; i++) {
                    if (!((activeMask >> i) & 1)) continue;
                    
                    p.stroke(colors[i]);
                    p.beginShape();
                    dataHistory[i].forEach((point, idx) => {
                        const x = p.map(idx, 0, MAX_HISTORY, 0, p.width);
                        const y = p.map(point.v, 0, 4095, p.height - 20, 20);
                        p.vertex(x, y);
                    });
                    p.endShape();
                }
            };

            p.windowResized = () => {
                const parent = document.getElementById('canvasParent');
                p.resizeCanvas(parent.offsetWidth, parent.offsetHeight);
            };
        });

        // --- 5. UI Initialization ---
        function initUI() {
            const grid = document.getElementById('channelGrid');
            const cards = document.getElementById('dataCards');
            const colors = ['text-cyan-400', 'text-indigo-400', 'text-rose-400', 'text-emerald-400', 'text-amber-400', 'text-purple-400'];
            
            for (let i = 0; i < 6; i++) {
                // Checkboxes
                const btn = document.createElement('button');
                btn.id = `ch-${i}`;
                btn.innerText = `CH ${i}`;
                btn.className = `p-2 rounded border border-slate-700 text-xs transition-all ${i === 0 ? 'bg-cyan-900 border-cyan-500 text-white' : 'text-slate-500'}`;
                btn.onclick = () => toggleChannel(i);
                grid.appendChild(btn);

                // Data Cards
                const card = document.createElement('div');
                card.id = `card-${i}`;
                card.className = `glass-card p-4 rounded-xl ${i === 0 ? '' : 'opacity-30'}`;
                card.innerHTML = `
                    <p class="text-xs text-slate-400">頻道 ${i}</p>
                    <p class="text-2xl font-mono font-bold ${colors[i]} val-text">---</p>
                `;
                cards.appendChild(card);
            }
            lucide.createIcons();
        }

        function toggleChannel(i) {
            activeMask ^= (1 << i);
            const btn = document.getElementById(`ch-${i}`);
            const card = document.getElementById(`card-${i}`);
            if ((activeMask >> i) & 1) {
                btn.className = 'p-2 rounded border border-cyan-500 bg-cyan-900 text-white text-xs transition-all';
                card.classList.remove('opacity-30');
            } else {
                btn.className = 'p-2 rounded border border-slate-700 text-slate-500 text-xs transition-all';
                card.classList.add('opacity-30');
            }
        }

        // --- Event Listeners ---
        document.getElementById('connectBtn').onclick = connectBLE;
        document.getElementById('applyBtn').onclick = sendConfig;
        document.getElementById('freqRange').oninput = (e) => {
            document.getElementById('freqLabel').innerText = `${e.target.value} Hz`;
        };
        document.getElementById('clearBtn').onclick = () => dataHistory = [[],[],[],[],[],[]];
        document.getElementById('exportBtn').onclick = () => {
            let csv = "Timestamp(ms),Channel,Value\n";
            dataHistory.forEach((ch, idx) => {
                ch.forEach(pt => csv += `${pt.t},${idx},${pt.v}\n`);
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'OmniSense_Data.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.onload = initUI;
    </script>
</body>
</html>
